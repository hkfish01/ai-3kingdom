version: "3.9"

services:
  city-api:
    build:
      context: ./backend
    container_name: ai3k-city-api
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/ai3k
      JWT_SECRET: ${JWT_SECRET:-change-me-in-prod}
      CITY_NAME: ${CITY_NAME:-Luoyang}
      CITY_BASE_URL: ${CITY_BASE_URL:-http://localhost:8000}
      WORLD_NAME: ${WORLD_NAME:-Three Kingdoms Autonomous World}
      CITY_WALL: ${CITY_WALL:-300}
      CITY_TAX_RATE: ${CITY_TAX_RATE:-0.05}
      OPEN_FOR_MIGRATION: ${OPEN_FOR_MIGRATION:-true}
      PROTOCOL_VERSION: ${PROTOCOL_VERSION:-1.0}
      RULE_VERSION: ${RULE_VERSION:-1.0}
      FEDERATION_SHARED_SECRET: ${FEDERATION_SHARED_SECRET:-federation-dev-secret}
      CENTRAL_REGISTRY_URL: ${CENTRAL_REGISTRY_URL:-http://city-api:8000/registry/cities/register}
      CENTRAL_REGISTRY_TOKEN: ${CENTRAL_REGISTRY_TOKEN:-}
      CENTRAL_ROLES_POLICY_URL: ${CENTRAL_ROLES_POLICY_URL:-http://city-api:8000/policy/roles}
      CENTRAL_HEARTBEAT_URL: ${CENTRAL_HEARTBEAT_URL:-http://city-api:8000/registry/nodes/heartbeat}
      CENTRAL_NODE_ID: ${CENTRAL_NODE_ID:-}
      CENTRAL_ROLES_POLICY_REQUIRED: ${CENTRAL_ROLES_POLICY_REQUIRED:-false}
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    networks:
      - prod_default

  city-worker:
    build:
      context: ./backend
    container_name: ai3k-city-worker
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/ai3k
      JWT_SECRET: ${JWT_SECRET:-change-me-in-prod}
      CITY_NAME: ${CITY_NAME:-Luoyang}
      CITY_BASE_URL: ${CITY_BASE_URL:-http://localhost:8000}
      WORLD_NAME: ${WORLD_NAME:-Three Kingdoms Autonomous World}
      CITY_WALL: ${CITY_WALL:-300}
      CITY_TAX_RATE: ${CITY_TAX_RATE:-0.05}
      OPEN_FOR_MIGRATION: ${OPEN_FOR_MIGRATION:-true}
      PROTOCOL_VERSION: ${PROTOCOL_VERSION:-1.0}
      RULE_VERSION: ${RULE_VERSION:-1.0}
      FEDERATION_SHARED_SECRET: ${FEDERATION_SHARED_SECRET:-federation-dev-secret}
      CENTRAL_REGISTRY_URL: ${CENTRAL_REGISTRY_URL:-http://city-api:8000/registry/cities/register}
      CENTRAL_REGISTRY_TOKEN: ${CENTRAL_REGISTRY_TOKEN:-}
      CENTRAL_ROLES_POLICY_URL: ${CENTRAL_ROLES_POLICY_URL:-http://city-api:8000/policy/roles}
      CENTRAL_HEARTBEAT_URL: ${CENTRAL_HEARTBEAT_URL:-http://city-api:8000/registry/nodes/heartbeat}
      CENTRAL_NODE_ID: ${CENTRAL_NODE_ID:-}
      CENTRAL_ROLES_POLICY_REQUIRED: ${CENTRAL_ROLES_POLICY_REQUIRED:-false}
    depends_on:
      - postgres
      - redis
    command: ["python", "-m", "app.worker"]
    networks:
      - prod_default

  postgres:
    image: postgres:16
    container_name: ai3k-postgres
    environment:
      POSTGRES_DB: ai3k
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - prod_default

  redis:
    image: redis:7
    container_name: ai3k-redis
    ports:
      - "6379:6379"
    networks:
      - prod_default

  frontend:
    container_name: ai3k-frontend
    networks:
      - prod_default

  gateway:
    image: nginx:1.25-alpine
    container_name: ai3k-gateway
    depends_on:
      - city-api
      - frontend
    volumes:
      - /home/rsadmin/develop/ai-3kingdom/deploy/prod/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "10090:80"
    networks:
      - prod_default

networks:
  prod_default:
    external: true

volumes:
  postgres-data:
